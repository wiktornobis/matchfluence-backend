namespace: matchfluence-dev

backend:
  image: matchfluence-backend
  tag: latest
  imagePullPolicy: Never
  replicas: 1
  port: 8080

postgres:
  image: postgres:16-alpine
  port: 5432
  storage: 1Gi

elasticsearch:
  image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
  port: 9200
  storage: 1Gi
  javaOpts: "-Xms512m -Xmx512m"